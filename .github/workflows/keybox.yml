name: Update Keybox

on:
  workflow_dispatch:
    inputs:
      keybox_link:
        description: "Direct link to keybox file"
        required: true
        type: string
      options:
        description: "File type"
        required: true
        type: choice
        options:
          - zip
          - xml
        default: xml
      password:
        description: "Zip password (if needed)"
        required: false
        type: string
        
permissions:
  contents: write
  
jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Download file
        run: |
          curl -L "${{ github.event.inputs.keybox_link }}" -o input_file

      - name: Extract file (ZIP only)
        if: ${{ github.event.inputs.options == 'zip' }}
        run: |
          sudo apt-get update && sudo apt-get install -y p7zip-full
          if [ -n "${{ github.event.inputs.password }}" ]; then
            7z x -y -p"${{ github.event.inputs.password }}" input_file
          else
            7z x -y input_file
          fi

      - name: Fetch Yurikey version
        run: |
          if [ "${{ github.event.inputs.options }}" = "xml" ]; then
            XML_FILE="input_file"
          else
            XML_FILE=$(find . -name "*.xml" | head -n 1)
            if [ -z "$XML_FILE" ]; then
              echo "No XML found!"
              exit 1
            fi
          fi

          VERSION=$(grep -oE 'Yurikey[0-9]+' "$XML_FILE" | head -n1)

          if [ -z "$VERSION" ]; then
            echo "No Yurikey version found!"
            exit 1
          fi

          base64 "$XML_FILE" | tr -d '\n' > key

          echo "VERSION=$VERSION"
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Commit & Push keybox
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add key

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "Update ${{ env.VERSION }}"
          git push
